    "qusage": {
      "Package": "qusage",
      "Version": "2.44.0",
      "Source": "Bioconductor",
      "Date": "2013-01-20",
      "Title": "qusage: Quantitative Set Analysis for Gene Expression",
      "Authors@R": "c(person(\"Christopher Bolen\", \"Developer\", role = c(\"aut\", \"cre\"), email = \"cbolen1@gmail.com\"), person(\"Gur Yaari\", \"Developer\", role = \"aut\"), person(\"Juilee Thakar\", \"Developer\", role = \"aut\"), person(\"Hailong Meng\",  \"Developer\", role = \"aut\"), person(\"Jacob Turner\",  \"Developer\", role = \"aut\"), person(\"Derek Blankenship\", \"Developer\", role = \"aut\"), person(\"Steven Kleinstein\", \"Developer\", role = \"aut\"))",
      "Author": "Christopher Bolen and Gur Yaari, with contributions from Juilee Thakar, Hailong Meng, Jacob Turner, Derek Blankenship, and Steven Kleinstein",
      "Maintainer": "Christopher Bolen <cbolen1@gmail.com>",
      "Depends": [
        "R (>= 2.10)",
        "limma (>= 3.14)",
        "methods"
      ],
      "Imports": [
        "utils",
        "Biobase",
        "nlme",
        "emmeans",
        "fftw"
      ],
      "Description": "This package is an implementation the Quantitative Set Analysis for Gene Expression (QuSAGE) method described in (Yaari G. et al, Nucl Acids Res, 2013). This is a novel Gene Set Enrichment-type test, which is designed to provide a faster, more accurate, and easier to understand test for gene expression studies. qusage accounts for inter-gene correlations using the Variance Inflation Factor technique proposed by Wu et al. (Nucleic Acids Res, 2012). In addition, rather than simply evaluating the deviation from a null hypothesis with a single number (a P value), qusage quantifies gene set activity with a complete probability density function (PDF). From this PDF, P values and confidence intervals can be easily extracted. Preserving the PDF also allows for post-hoc analysis (e.g., pair-wise comparisons of gene set activity) while maintaining statistical traceability. Finally, while qusage is compatible with individual gene statistics from existing methods (e.g., LIMMA), a Welch-based method is implemented that is shown to improve specificity. The QuSAGE package also includes a mixed effects model implementation, as described in (Turner JA et al, BMC Bioinformatics, 2015), and a meta-analysis framework as described in (Meng H, et al. PLoS Comput Biol. 2019). For questions, contact Chris Bolen (cbolen1@gmail.com) or Steven Kleinstein (steven.kleinstein@yale.edu)",
      "License": "GPL (>= 2)",
      "URL": "http://clip.med.yale.edu/qusage",
      "biocViews": "GeneSetEnrichment, Microarray, RNASeq, Software, ImmunoOncology",
      "Config/pak/sysreqs": "libfftw3-dev",
      "Repository": "https://bioc-release.r-universe.dev",
      "RemoteUrl": "https://github.com/bioc/qusage",
      "RemoteRef": "RELEASE_3_22",
      "RemoteSha": "123902b838af1528188be3dc2ee9689ee7df7bf5",
      "NeedsCompilation": "no"
    },
    "qvalue": {
      "Package": "qvalue",
      "Version": "2.42.0",
      "Source": "Bioconductor",
      "Type": "Package",
      "Title": "Q-value estimation for false discovery rate control",
      "Date": "2015-03-24",
      "Authors@R": "as.person(c( \"John D. Storey <jdstorey@princeton.edu> [aut, cre]\",  \"Andrew J. Bass <ajbass@emory.edu> [aut]\",  \"Alan Dabney [aut]\", \"David Robinson [aut]\", \"Gregory Warnes [ctb]\" ))",
      "Maintainer": "John D. Storey <jstorey@princeton.edu>, Andrew J. Bass <ajbass@emory.edu>",
      "biocViews": "MultipleComparisons",
      "Description": "This package takes a list of p-values resulting from the simultaneous testing of many hypotheses and estimates their q-values and local FDR values. The q-value of a test measures the proportion of false positives incurred (called the false discovery rate) when that particular test is called significant. The local FDR measures the posterior probability the null hypothesis is true given the test's p-value. Various plots are automatically generated, allowing one to make sensible significance cut-offs. Several mathematical results have recently been shown on the conservative accuracy of the estimated q-values from this software. The software can be applied to problems in genomics, brain imaging, astrophysics, and data mining.",
      "VignetteBuilder": "knitr",
