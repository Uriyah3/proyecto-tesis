        "splines",
        "ggplot2",
        "grid",
        "reshape2"
      ],
      "Suggests": [
        "knitr"
      ],
      "Depends": [
        "R(>= 2.10)"
      ],
      "URL": "http://github.com/jdstorey/qvalue",
      "License": "LGPL",
      "RoxygenNote": "5.0.1",
      "Config/pak/sysreqs": "libicu-dev",
      "Repository": "https://bioc-release.r-universe.dev",
